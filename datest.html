<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .staggered-menu-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 40;
      pointer-events: none;
    }

    .staggered-menu-wrapper.fixed-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 40;
      overflow: hidden;
    }

    .staggered-menu-header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2em;
      background: transparent;
      pointer-events: none;
      z-index: 20;
    }

    .staggered-menu-header > * { pointer-events: auto; }
    .sm-logo { display:flex; align-items:center; user-select:none; }
    .sm-logo-img { display:block; height:32px; width:auto; object-fit:contain; }
    .sm-toggle { position: relative; display:inline-flex; align-items:center; gap:0.3rem; background:transparent; border:none; cursor:pointer; color:#e9e9ef; font-weight:500; line-height:1; overflow:visible; }
    .sm-toggle:focus-visible { outline: 2px solid #ffffffaa; outline-offset: 4px; border-radius: 4px; }
    .sm-toggle-textWrap { position: relative; display: inline-block; height: 1em; overflow:hidden; white-space:nowrap; width:var(--sm-toggle-width, auto); min-width:var(--sm-toggle-width, auto); }
    .sm-toggle-textInner { display:flex; flex-direction:column; line-height:1; }
    .sm-toggle-line { display:block; height:1em; line-height:1; }
    .sm-icon { position: relative; width:14px; height:14px; flex:0 0 14px; display:inline-flex; align-items:center; justify-content:center; will-change: transform; }
    .sm-panel-itemWrap { position: relative; overflow: hidden; line-height: 1; }
    .sm-icon-line { position:absolute; left:50%; top:50%; width:100%; height:2px; background:currentColor; border-radius:2px; transform:translate(-50%,-50%); will-change: transform; }
    .sm-line { display: none !important; }
    .staggered-menu-panel { position:absolute; top:0; right:0; width:clamp(260px, 38vw, 420px); height:100%; background:white; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display:flex; flex-direction:column; padding:6em 2em 2em 2em; overflow-y:auto; z-index:10; }
    [data-position='left'] .staggered-menu-panel { right: auto; left: 0; }
    .sm-prelayers { position:absolute; top:0; right:0; bottom:0; width:clamp(260px,38vw,420px); pointer-events:none; z-index:5; }
    [data-position='left'] .sm-prelayers { right:auto; left:0; }
    .sm-prelayer { position:absolute; top:0; right:0; height:100%; width:100%; transform: translateX(0); }
    .sm-panel-inner { flex:1; display:flex; flex-direction:column; gap:1.25rem; }
    .sm-socials { margin-top:auto; padding-top:2rem; display:flex; flex-direction:column; gap:0.75rem; }
    .sm-socials-title { margin:0; font-size:1rem; font-weight:500; color:var(--sm-accent,#ff0000); }
    .sm-socials-list { list-style:none; margin:0; padding:0; display:flex; flex-direction:row; align-items:center; gap:1rem; flex-wrap:wrap; }
    .sm-socials-list .sm-socials-link { opacity: 1; }
    .sm-socials-list:hover .sm-socials-link { opacity: 0.35; }
    .sm-socials-list:hover .sm-socials-link:hover { opacity: 1; }
    .sm-socials-link:focus-visible { outline: 2px solid var(--sm-accent, #ff0000); outline-offset: 3px; }
    .sm-socials-list:focus-within .sm-socials-link { opacity: 0.35; }
    .sm-socials-list:focus-within .sm-socials-link:focus-visible { opacity: 1; }
    .sm-socials-link { font-size:1.2rem; font-weight:500; color:#111; text-decoration:none; position:relative; padding:2px 0; display:inline-block; transition: color .3s ease, opacity .3s ease; }
    .sm-socials-link:hover { color: var(--sm-accent, #ff0000); }
    .sm-panel-title { margin:0; font-size:1rem; font-weight:600; color:#fff; text-transform:uppercase; }
    .sm-panel-list { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:0.5rem; }
    .sm-panel-item { position:relative; color:#000; font-weight:600; font-size:3.5rem; cursor:pointer; line-height:1; letter-spacing:-2px; text-transform:uppercase; transition: background .25s, color .25s; display:inline-block; text-decoration:none; padding-right:1.4em; }
    .staggered-menu-panel .sm-socials-list .sm-socials-link { opacity: 1; transition: opacity 0.3s ease; }
    .staggered-menu-panel .sm-socials-list:hover .sm-socials-link:not(:hover) { opacity: 0.35; }
    .staggered-menu-panel .sm-socials-list:focus-within .sm-socials-link:not(:focus-visible) { opacity: 0.35; }
    .staggered-menu-panel .sm-socials-list .sm-socials-link:hover,
    .staggered-menu-panel .sm-socials-list .sm-socials-link:focus-visible { opacity: 1; }
    .sm-panel-itemLabel { display:inline-block; will-change: transform; transform-origin: 50% 100%; }
    .sm-panel-item:hover { color: var(--sm-accent, #5227ff); }
    .sm-panel-list[data-numbering] { counter-reset: smItem; }
    .sm-panel-list[data-numbering] .sm-panel-item::after { counter-increment: smItem; content: counter(smItem, decimal-leading-zero); position:absolute; top:0.1em; right:2.8em; font-size:18px; font-weight:400; color:var(--sm-accent,#5227ff); letter-spacing:0; pointer-events:none; user-select:none; opacity:var(--sm-num-opacity,0); }

    @media (max-width:1024px) {
      .staggered-menu-panel { width:100%; left:0; right:0; }
      .staggered-menu-wrapper[data-open] .sm-logo-img { filter: invert(100%); }
    }
    @media (max-width:640px) {
      .staggered-menu-panel { width:100%; left:0; right:0; }
      .staggered-menu-wrapper[data-open] .sm-logo-img { filter: invert(100%); }
    }
  </style>
</head>
<body>
  <main style="height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;color:white;">
    <div id="root" style="width:100%;max-width:1100px;padding:40px;"></div>
  </main>

  <!-- UMD React + ReactDOM, GSAP and Babel for in-browser JSX transpile -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useCallback, useLayoutEffect, useRef, useState, useEffect } = React;
    const gsapLib = window.gsap;

    function StaggeredMenu({
      position = 'right',
      colors = ['#B19EEF', '#5227FF'],
      items = [],
      socialItems = [],
      displaySocials = true,
      displayItemNumbering = true,
      className,
      logoUrl,
      menuButtonColor = '#fff',
      openMenuButtonColor = '#fff',
      accentColor = '#5227FF',
      changeMenuColorOnOpen = true,
      isFixed = false,
      closeOnClickAway = true,
      onMenuOpen,
      onMenuClose
    }) {
      const [open, setOpen] = useState(false);
      const openRef = useRef(false);
      const panelRef = useRef(null);
      const preLayersRef = useRef(null);
      const preLayerElsRef = useRef([]);
      const plusHRef = useRef(null);
      const plusVRef = useRef(null);
      const iconRef = useRef(null);
      const textInnerRef = useRef(null);
      const toggleBtnRef = useRef(null);
      const [textLines, setTextLines] = useState(['Menu','Close']);
      const busyRef = useRef(false);
      const openTlRef = useRef(null);
      const closeTweenRef = useRef(null);

      useLayoutEffect(() => {
        const panel = panelRef.current;
        const preContainer = preLayersRef.current;
        if (!panel) return;
        const preLayers = preContainer ? Array.from(preContainer.querySelectorAll('.sm-prelayer')) : [];
        preLayerElsRef.current = preLayers;
        const offscreen = position === 'left' ? -100 : 100;
        gsapLib.set([panel, ...preLayers], { xPercent: offscreen });
      }, [position]);

      const buildOpenTimeline = useCallback(() => {
        const panel = panelRef.current;
        const layers = preLayerElsRef.current || [];
        if (!panel) return null;
        openTlRef.current?.kill();
        if (closeTweenRef.current) { closeTweenRef.current.kill(); closeTweenRef.current = null; }
        const itemEls = Array.from(panel.querySelectorAll('.sm-panel-itemLabel'));
        const layerStates = layers.map(el => ({ el, start: Number(gsapLib.getProperty(el, 'xPercent')) }));
        if (itemEls.length) gsapLib.set(itemEls, { yPercent: 140, rotate: 10 });
        const tl = gsapLib.timeline({ paused: true });
        layerStates.forEach((ls, i) => {
          tl.fromTo(ls.el, { xPercent: ls.start }, { xPercent: 0, duration: 0.5, ease: 'power4.out' }, i * 0.07);
        });
        const lastTime = layerStates.length ? (layerStates.length - 1) * 0.07 : 0;
        const panelInsertTime = lastTime + (layerStates.length ? 0.08 : 0);
        const panelDuration = 0.65;
        const panelStart = Number(gsapLib.getProperty(panel, 'xPercent'));
        tl.fromTo(panel, { xPercent: panelStart }, { xPercent: 0, duration: panelDuration, ease: 'power4.out' }, panelInsertTime);
        if (itemEls.length) {
          const itemsStart = panelInsertTime + panelDuration * 0.15;
          tl.to(itemEls, { yPercent: 0, rotate: 0, duration: 1, ease: 'power4.out', stagger: { each: 0.1, from: 'start' } }, itemsStart);
        }
        openTlRef.current = tl;
        return tl;
      }, []);

      const playOpen = useCallback(() => {
        if (busyRef.current) return;
        busyRef.current = true;
        const tl = buildOpenTimeline();
        if (tl) {
          tl.eventCallback('onComplete', () => { busyRef.current = false; });
          tl.play(0);
        } else busyRef.current = false;
      }, [buildOpenTimeline]);

      const playClose = useCallback(() => {
        openTlRef.current?.kill();
        openTlRef.current = null;
        const panel = panelRef.current;
        const layers = preLayerElsRef.current || [];
        if (!panel) return;
        const all = [...layers, panel];
        closeTweenRef.current?.kill();
        const offscreen = position === 'left' ? -100 : 100;
        closeTweenRef.current = gsapLib.to(all, { xPercent: offscreen, duration: 0.32, ease: 'power3.in', onComplete: () => { busyRef.current = false; }});
      }, [position]);

      const toggleMenu = useCallback(() => {
        const target = !openRef.current;
        openRef.current = target;
        setOpen(target);
        if (target) { onMenuOpen?.(); playOpen(); document.body.style.overflow = 'hidden'; }
        else { onMenuClose?.(); playClose(); document.body.style.overflow = ''; }
      }, [playOpen, playClose, onMenuOpen, onMenuClose]);

      useEffect(() => {
        if (!closeOnClickAway || !open) return;
        function onDoc(e) {
          if (panelRef.current && !panelRef.current.contains(e.target) && toggleBtnRef.current && !toggleBtnRef.current.contains(e.target)) toggleMenu();
        }
        document.addEventListener('mousedown', onDoc);
        return () => document.removeEventListener('mousedown', onDoc);
      }, [closeOnClickAway, open, toggleMenu]);

      return (
        <div className={'staggered-menu-wrapper' + (isFixed ? ' fixed-wrapper' : '')} style={accentColor ? { ['--sm-accent']: accentColor } : undefined} data-position={position} data-open={open || undefined}>
          <div ref={preLayersRef} className="sm-prelayers" aria-hidden="true">
            {(() => {
              const raw = colors && colors.length ? colors.slice(0,4) : ['#1e1e22','#35353c'];
              let arr = [...raw];
              if
