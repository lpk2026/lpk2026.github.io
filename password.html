<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Enter</title>
    <style>
        @font-face {
            font-family: 'cherrydance';
            src: url('cherrydance.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'casagrande';
            src: url('casagrande.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background: #ede8d0;
            color: #7a3333;
            font-family: "cherrydance";
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            will-change: opacity, transform;
        }

        body.loaded .container {
            opacity: 1;
            transform: translateY(0);
        }


        input {
            font-size: 16px;
            padding: 10px 18px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-family: 'cherrydance';
            text-align: center;
        }

        button {
            padding: 8px 14px;
            font-size: 16px;
            margin-left: 5px;
            cursor: pointer;
            padding: 10px 18px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            background-color: #111;
            color: #ede8d0;
            font-family: 'cherrydance';
        }

        #message {
            margin-top: 15px;
            color: #7a3333;
            height: 20px;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #message.visible {
            opacity: 1;
        }

        #upper {
            /* top SVG stays fixed */
            will-change: transform;
        }

        #downer {
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
        }

        #downer.shift {
            transform: translateY(50px);
        }

        /* make SVGs match site color */
        #upper path,
        #downer path {
            fill: #7a3333;
            transition: fill 0.25s ease;
        }
    </style>
</head>

    <script>
        // timeout ids for clearing message and inner content after fade
        let clearMsgTimeout = null;
        let clearInnerTimeout = null;

        const bottomBar = document.getElementById('downer');
        const messageEl = document.getElementById('message');

        function showWrongMessage(text) {
            // show message and shift bottom bar
            messageEl.innerHTML = text;
            messageEl.classList.add('visible');
            bottomBar.classList.add('shift');

            // clear previous timers
            if (clearMsgTimeout) {
                clearTimeout(clearMsgTimeout);
            }
            if (clearInnerTimeout) {
                clearTimeout(clearInnerTimeout);
                clearInnerTimeout = null;
            }

            // after 7s, fade out message and move bar back
            clearMsgTimeout = setTimeout(() => {
                messageEl.classList.remove('visible');
                bottomBar.classList.remove('shift');
                clearMsgTimeout = null;

                // clear innerHTML after fade transition completes (match 600ms)
                clearInnerTimeout = setTimeout(() => {
                    messageEl.innerHTML = '';
                    clearInnerTimeout = null;
                }, 600);
            }, 7000);
        }

        function checkPassword() {
            const input = document.getElementById("password").value;

            if (input === "banana") {
                // successful - clear timers and reset UI
                if (clearMsgTimeout) { clearTimeout(clearMsgTimeout); clearMsgTimeout = null; }
                if (clearInnerTimeout) { clearTimeout(clearInnerTimeout); clearInnerTimeout = null; }
                messageEl.classList.remove('visible');
                messageEl.innerHTML = '';
                bottomBar.classList.remove('shift');

                window.location.href = "gallery.html";
            } else {
                showWrongMessage("wrong password dummy :)<br>try again");
            }
        }

        // allow pressing Enter key
        document.getElementById("password").addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                checkPassword();
            }
        });

        // add loaded class to body after load so content fades in
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => document.body.classList.add('loaded'), 50);
        });
    </script>
