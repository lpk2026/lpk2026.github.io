<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Gallery</title>
  <style>
    @font-face {
      font-family: 'casagrande';
      src: url('casagrande.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'chemicallife';
      src: url('chemicallife.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }


    body {
      margin: 0;
      padding: 0;
      background:#fff;
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    }

    h1 {
      text-align: center;
      padding: 40px 0 10px;
      color: #7a3333;
      font-size: 70px;
      font-family: 'chemicallife';
    }

    h2 {
      text-align: left;
      font-weight: 500;
      color: #111;
      position: relative;
      padding: 20px 20px 10px;
      margin: 0;
    }

    h2::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      border-radius: 2px;
      width: calc(100vw - 40px);
      /* full viewport width */
      height: 5px;
      /* line thickness */
      background: #7a3333;
      /* line color */
      transform: translateX(20px);
      /* adjust since we padded h2 by 20px */
    }


    .gallery {
      column-count: 7;
      column-gap: 15px;
      padding: 0 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
      display: block;
      cursor: pointer;
      transition: transform 0.3s ease;
      break-inside: avoid;
    }

    .gallery img:hover {
      transform: scale(1.03);
    }


    @media (max-width: 1900px) {
      .gallery {
        column-count: 6;
      }
    }


    @media (max-width: 1600px) {
      .gallery {
        column-count: 5;
      }
    }


    @media (max-width: 1200px) {
      .gallery {
        column-count: 4;
      }
    }

    @media (max-width: 800px) {
      .gallery {
        column-count: 3;
      }
    }

    @media (max-width: 500px) {
      .gallery {
        column-count: 2;
      }
    }



    /* Lightbox */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox img {
      max-width: 80%;
      max-height: 75vh;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
      margin-bottom: 20px;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .description {
      color: #ddd;
      font-size: 18px;
      text-align: center;
      max-width: 80%;
    }

    .close-btn {
      position: fixed;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 32px;
      cursor: pointer;
      user-select: none;
    }

    .arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      font-size: 40px;
      cursor: pointer;
      user-select: none;
      padding: 20px;
    }

    .arrow.left {
      left: 20px;
    }

    .arrow.right {
      right: 20px;
    }

    .arrow:hover,
    .close-btn:hover {
      color: #bbb;
    }


    svg{
      width: calc(100vw - 30px);
      top: 15px;
      left: 15px;
      position: absolute;
      fill: #7a3333;
      height: auto;
      display: block;
      margin: 0 auto;
    }

  </style>
</head>

      data-description="A calm evening beneath the crescent moon.">
    <img src="https://picsum.photos/400/500?random=13" alt="Decor"
      data-description="Lanterns glowing softly in the evening.">
  </div>

  <!-- BacSport Section -->
  <h2 id="bacsport">BacSport</h2>
  <br>
  <div class="gallery" data-section="bacsport">
    <img src="https://picsum.photos/400/750?random=6" alt="Running"
      data-description="Sweat, sun, and determination.">
    <img src="https://picsum.photos/400/650?random=7" alt="Victory"
      data-description="That feeling when you finally finish the race.">
  </div>

  <!-- Graduation Section -->
  <h2 id="graduation">Graduation</h2>
  <br>
  <div class="gallery" data-section="graduation">
    <img src="https://picsum.photos/400/600?random=21" alt="Caps in Air"
      data-description="Celebrating the end of an era.">
    <img src="https://picsum.photos/400/550?random=22" alt="Diploma"
      data-description="The hard work finally paid off.">
  </div>

  <!-- Lightbox (unchanged) -->
  <div class="lightbox" id="lightbox">
    <span class="close-btn" id="closeBtn">&times;</span>
    <span class="arrow left" id="prev">&#10094;</span>
    <img src="" alt="">
    <div class="description" id="desc"></div>
    <span class="arrow right" id="next">&#10095;</span>
  </div>

  <script>
    // Lightbox (same as before)
    const galleries = document.querySelectorAll('.gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = lightbox.querySelector('img');
    const lightboxDesc = document.getElementById('desc');
    const closeBtn = document.getElementById('closeBtn');
    const nextBtn = document.getElementById('next');
    const prevBtn = document.getElementById('prev');

    let currentImages = [];
    let currentIndex = 0;

    galleries.forEach(gallery => {
      const imgs = gallery.querySelectorAll('img');
      imgs.forEach((img, index) => {
        img.addEventListener('click', () => {
          currentImages = Array.from(imgs);
          currentIndex = index;
          showImage(currentImages[currentIndex]);
        });
      });
    });

    function showImage(img) {
      lightbox.classList.add('active');
      lightboxImg.src = img.src;
      lightboxDesc.textContent = img.dataset.description || '';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % currentImages.length;
      showImage(currentImages[currentIndex]);
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
      showImage(currentImages[currentIndex]);
    }

    closeBtn.addEventListener('click', closeLightbox);
    nextBtn.addEventListener('click', nextImage);
    prevBtn.addEventListener('click', prevImage);
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'ArrowRight') nextImage();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'Escape') closeLightbox();
    });

    // Scroll button logic
    const scrollBtn = document.getElementById('scrollBtn');
    scrollBtn.addEventListener('click', () => {
      window.scrollBy({ top: window.innerHeight * 0.5, behavior: 'smooth' });
    });
  </script>

  <style>
    header {
      position: sticky;
      top: 0;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      padding: 15px 0;
      border-bottom: 2px solid #7a3333;
      z-index: 999;
    }

    header nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
    }

    header nav a {
      text-decoration: none;
      color: #7a3333;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    header nav a:hover {
      color: #b55a5a;
    }

    #scrollBtn {
      display: none;
      background: #7a3333;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 18px;
      cursor: pointer;
    }

    #scrollBtn:hover {
      background: #9b4646;
    }

    @media (max-width: 700px) {
      #scrollBtn {
        display: block;
      }
    }

    html {
      scroll-behavior: smooth;
    }
  </style>

</body>
