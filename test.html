<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Gallery</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #fafafa;
      font-family: 'Poppins', sans-serif;
    }

    h1 {
      text-align: center;
      padding: 40px 0 10px;
      color: #333;
      font-weight: 600;
    }

    h2 {
      text-align: left;
      padding: 20px;
      font-weight: 500;
      color: #444;
    }

    .gallery {
      column-count: 4;
      column-gap: 15px;
      padding: 0 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
      display: block;
      cursor: pointer;
      transition: transform 0.3s ease;
      break-inside: avoid;
    }

    .gallery img:hover {
      transform: scale(1.03);
    }

    /* Responsive */
    @media (max-width: 1200px) { .gallery { column-count: 3; } }
    @media (max-width: 800px) { .gallery { column-count: 2; } }
    @media (max-width: 500px) { .gallery { column-count: 1; } }

    /* Lightbox */
    .lightbox {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox img {
      max-width: 80%;
      max-height: 75vh;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
      margin-bottom: 20px;
      animation: pop 0.3s ease;
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .description {
      color: #ddd;
      font-size: 18px;
      text-align: center;
      max-width: 80%;
    }

    .close-btn {
      position: fixed;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 32px;
      cursor: pointer;
      user-select: none;
    }

    .arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      font-size: 40px;
      cursor: pointer;
      user-select: none;
      padding: 20px;
    }

    .arrow.left { left: 20px; }
    .arrow.right { right: 20px; }

    .arrow:hover, .close-btn:hover {
      color: #bbb;
    }
  </style>
</head>
<body>

  <h1>Memory Gallery 2026</h1>

  <!-- Prom Section -->
  <h2>Prom</h2>
  <div class="gallery" data-section="prom">
    <img src="https://picsum.photos/400/600?random=1" alt="Prom Night" data-description="Dancing under the lights — a night to remember.">
    <img src="https://picsum.photos/400/500?random=2" alt="Group Photo" data-description="The class all together — laughter, flash, and forever.">
    <img src="https://picsum.photos/400/700?random=3" alt="Candid" data-description="Caught between laughter and goodbyes.">
  </div>

  <!-- Ramadhan Section -->
  <h2>Ramadhan</h2>
  <div class="gallery" data-section="ramadhan">
    <img src="https://picsum.photos/400/400?random=4" alt="Iftar" data-description="Breaking fast with friends and stories shared.">
    <img src="https://picsum.photos/400/550?random=5" alt="Mosque Night" data-description="A calm evening beneath the crescent moon.">
  </div>

  <!-- BacSport Section -->
  <h2>BacSport</h2>
  <div class="gallery" data-section="bacsport">
    <img src="https://picsum.photos/400/750?random=6" alt="Running" data-description="Sweat, sun, and determination.">
    <img src="https://picsum.photos/400/650?random=7" alt="Victory" data-description="That feeling when you finally finish the race.">
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="close-btn" id="closeBtn">&times;</span>
    <span class="arrow left" id="prev">&#10094;</span>
    <img src="" alt="">
    <div class="description" id="desc"></div>
    <span class="arrow right" id="next">&#10095;</span>
  </div>

  <script>
    const galleries = document.querySelectorAll('.gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = lightbox.querySelector('img');
    const lightboxDesc = document.getElementById('desc');
    const closeBtn = document.getElementById('closeBtn');
    const nextBtn = document.getElementById('next');
    const prevBtn = document.getElementById('prev');

    let currentImages = [];
    let currentIndex = 0;

    galleries.forEach(gallery => {
      const imgs = gallery.querySelectorAll('img');
      imgs.forEach((img, index) => {
        img.addEventListener('click', () => {
          currentImages = Array.from(imgs);
          currentIndex = index;
          showImage(currentImages[currentIndex]);
        });
      });
    });

    function showImage(img) {
      lightbox.classList.add('active');
      lightboxImg.src = img.src;
      lightboxDesc.textContent = img.dataset.description || '';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % currentImages.length;
      showImage(currentImages[currentIndex]);
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
      showImage(currentImages[currentIndex]);
    }

    closeBtn.addEventListener('click', closeLightbox);
    nextBtn.addEventListener('click', nextImage);
    prevBtn.addEventListener('click', prevImage);
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'ArrowRight') nextImage();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
