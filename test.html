<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Slider Sections</title>
<style>
@font-face {
  font-family: 'casagrande';
  src: url('casagrande.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #fff;
  overflow-x: hidden; /* prevent horizontal black space */
}

.slider-section {
  width: 100%;  /* full width of container */
  max-width: 100%; /* prevent overflow */
  height: 50vh;
  display: flex;
  background: #111;
  color: #fff;
  overflow: hidden;
  opacity: 0;
  transform: translateX(0); /* start at 0 instead of 5% */
  transition: opacity 1s ease, transform 1s ease;
  margin: 0; /* remove gap */
}

/* When section becomes visible */
.slider-section.visible {
  opacity: 1;
  transform: translateX(0);
}

/* Vertical title */
.slider-title {
  width: 120px;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-size: 4rem;
  font-weight: bold;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #222;
  font-family: 'casagrande';
}

/* Slider wrapper */
.slider-wrapper {
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 20px;
  scroll-behavior: smooth;
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.slider-wrapper::-webkit-scrollbar {
  display: none;
}

/* Slider container */
.slider {
  display: flex;
  gap: 20px;
}

/* Each slide */
.slide {
  min-width: 250px;
  height: 100%;
  flex-shrink: 0;
  background: #333;
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  font-size: 1.2rem;
  color: #fff;
  cursor: pointer;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* SEE MORE button */
.slide.see-more {
  background: rgba(255,0,0,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 1.2rem;
  font-weight: bold;
}

/* Fade-in slides */
.slide.visible {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>
<body>

<section class="slider-section">
  <div class="slider-title">GALLERY 1</div>
  <div class="slider-wrapper">
    <div class="slider">
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=1-1" alt="1"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=1-2" alt="2"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=1-3" alt="3"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=1-4" alt="4"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=1-5" alt="5"></div>
      <div class="slide see-more">SEE MORE</div>
    </div>
  </div>
</section>

<!-- Repeat for remaining sections (2-5) -->
<section class="slider-section">
  <div class="slider-title">GALLERY 2</div>
  <div class="slider-wrapper">
    <div class="slider">
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=2-1" alt="1"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=2-2" alt="2"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=2-3" alt="3"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=2-4" alt="4"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=2-5" alt="5"></div>
      <div class="slide see-more">SEE MORE</div>
    </div>
  </div>
</section>

<section class="slider-section">
  <div class="slider-title">GALLERY 3</div>
  <div class="slider-wrapper">
    <div class="slider">
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=3-1" alt="1"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=3-2" alt="2"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=3-3" alt="3"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=3-4" alt="4"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=3-5" alt="5"></div>
      <div class="slide see-more">SEE MORE</div>
    </div>
  </div>
</section>

<section class="slider-section">
  <div class="slider-title">GALLERY 4</div>
  <div class="slider-wrapper">
    <div class="slider">
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=4-1" alt="1"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=4-2" alt="2"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=4-3" alt="3"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=4-4" alt="4"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=4-5" alt="5"></div>
      <div class="slide see-more">SEE MORE</div>
    </div>
  </div>
</section>

<section class="slider-section">
  <div class="slider-title">GALLERY 5</div>
  <div class="slider-wrapper">
    <div class="slider">
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=5-1" alt="1"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=5-2" alt="2"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=5-3" alt="3"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=5-4" alt="4"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=5-5" alt="5"></div>
      <div class="slide see-more">SEE MORE</div>
    </div>
  </div>
</section>

<script>
// Observe sections for fade-in
const sections = document.querySelectorAll('.slider-section');
sections.forEach(section => {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.2 });
  observer.observe(section);
});

// Drag/touch/wheel for sliders
document.querySelectorAll('.slider').forEach(slider => {
  let isDown = false, startX, scrollLeft;
  slider.addEventListener('mousedown', e => { isDown=true; startX=e.pageX-slider.offsetLeft; scrollLeft=slider.scrollLeft; });
  slider.addEventListener('mouseleave', ()=>isDown=false);
  slider.addEventListener('mouseup', ()=>isDown=false);
  slider.addEventListener('mousemove', e=>{ if(!isDown) return; e.preventDefault(); slider.scrollLeft = scrollLeft - (e.pageX-startX); });
  slider.addEventListener('touchstart', e=>{ startX=e.touches[0].pageX-slider.offsetLeft; scrollLeft=slider.scrollLeft; });
  slider.addEventListener('touchmove', e=>{ slider.scrollLeft = scrollLeft - (e.touches[0].pageX-startX); });
  slider.addEventListener('wheel', e=>{ e.preventDefault(); slider.scrollLeft+=e.deltaY; });
});

// Fade-in slides individually
document.querySelectorAll('.slider-wrapper').forEach(wrapper => {
  const slides = wrapper.querySelectorAll('.slide');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('visible'); });
  }, { root: wrapper, threshold: 0.5 });
  slides.forEach(slide => observer.observe(slide));
});
</script>
</body>
</html>
