<section class="slider-section">
  <div class="slider-title">GALLERY</div>
  <div class="slider-wrapper">
    <div class="slider">
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=1" alt="1"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=2" alt="2"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=3" alt="3"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=4" alt="4"></div>
      <div class="slide"><img src="https://via.placeholder.com/300x200?text=5" alt="5"></div>
      <div class="slide see-more">SEE MORE</div>
    </div>
  </div>
</section>

<style>
.slider-section {
  width: 100vw;
  height: 50vh;
  display: flex;
  background: #111;
  color: #fff;
  overflow: hidden;
}

.slider-title {
  width: 150px;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-size: 2rem;
  font-weight: bold;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #222;
}

.slider-wrapper {
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 20px;
  scroll-behavior: smooth;
}

.slider {
  display: flex;
  gap: 20px;
}

.slide {
  min-width: 250px;
  height: 100%;
  flex-shrink: 0;
  background: #333;
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  font-size: 1.2rem;
  color: #fff;
  cursor: pointer;
  opacity: 0; /* hidden initially */
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.slide.see-more {
  background: rgba(255,0,0,0.8);
}

/* When visible */
.slide.visible {
  opacity: 1;
  transform: translateY(0);
}
</style>

<script>
const slider = document.querySelector('.slider');
let isDown = false;
let startX;
let scrollLeft;

// Mouse drag
slider.addEventListener('mousedown', (e) => {
  isDown = true;
  slider.classList.add('active');
  startX = e.pageX - slider.offsetLeft;
  scrollLeft = slider.scrollLeft;
});
slider.addEventListener('mouseleave', () => isDown = false);
slider.addEventListener('mouseup', () => isDown = false);
slider.addEventListener('mousemove', (e) => {
  if(!isDown) return;
  e.preventDefault();
  const x = e.pageX - slider.offsetLeft;
  const walk = (x - startX) * 1; // scroll speed
  slider.scrollLeft = scrollLeft - walk;
});

// Touch drag
slider.addEventListener('touchstart', (e) => {
  startX = e.touches[0].pageX - slider.offsetLeft;
  scrollLeft = slider.scrollLeft;
});
slider.addEventListener('touchmove', (e) => {
  const x = e.touches[0].pageX - slider.offsetLeft;
  const walk = (x - startX) * 1;
  slider.scrollLeft = scrollLeft - walk;
});

// Fade in on scroll using IntersectionObserver
const slides = document.querySelectorAll('.slide');
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
}, {
  root: document.querySelector('.slider-wrapper'),
  threshold: 0.5 // when 50% visible
});

slides.forEach(slide => observer.observe(slide));
</script>
